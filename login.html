<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café & Cia - Login</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <h2>Bem-vindo à Café & Cia</h2>
            <p>Desfrute da melhor experiência com nosso tema aconchegante de café. Faça login ou cadastre-se para continuar.</p>
        </div>
        
        <div class="form-section">
            <!-- Formulário de Login -->
            <div class="form-container" id="login-form">
                <div class="logo">
                    <h1>Café & <span>Cia</span></h1>
                </div>
                
                <form id="login">
                    <div class="form-group">
                        <label for="login-email">E-mail</label>
                        <input type="email" id="login-email" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" placeholder="Sua senha" required>
                    </div>
                    
                    <button type="submit" class="btn">Entrar</button>
                </form>
            </div>
                
        <div class="switch-form">
            <p>Não tem uma conta? <a href="cadastro.html" id="show-register">Cadastre-se</a></p>
        </div>
    </div>       
</body>
</html>
