<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <h2>Bem-vindo</h2>
            <p>Desfrute da melhor experiência com nosso tema aconchegante de café. Faça login ou cadastre-se para continuar.</p>
        </div>

        <div class="form-section">
            <div class="form-container" id="register-form">
                <div class="logo">
                    <h1>Café & <span>Cia</span></h1>
                </div>

                <form id="register">
                    <div class="form-group">
                        <label for="register-name">Nome completo</label>
                        <input type="text" id="register-name" placeholder="Seu nome completo" required>
                    </div>

                    <div class="form-group">
                        <label for="register-email">E-mail</label>
                        <input type="email" id="register-email" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="register-password">Senha</label>
                        <input type="password" id="register-password" placeholder="Crie uma senha" required>
                    </div>

                    <div class="form-group">
                        <label for="register-confirm">Confirmar senha</label>
                        <input type="password" id="register-confirm" placeholder="Confirme sua senha" required>
                    </div>

                    <button type="submit" class="btn">Criar conta</button>
                </form>

                <div class="switch-form">
                    <p>Já tem uma conta? <a href="login.html" id="show-login">Faça login</a></p>
                </div>
            </div>
        </div>

    
    </div>
    
</body>
</html>
